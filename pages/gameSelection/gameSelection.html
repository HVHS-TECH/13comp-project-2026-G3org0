<!DOCTYPE html>
<html lang="en">
<head>
    <title>12COMP firebase</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- stylesheets *******************************************-->
    <link rel="stylesheet" type="text/css" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" type="text/css" href="../../style.css">
    <link href='https://fonts.googleapis.com/css?family=M PLUS Code Latin' rel='stylesheet'>


    <!-- firebase start ****************************************-->
    <link type="text/css" rel="stylesheet" href="https://cdn.firebase.com/libs/firebaseui/3.5.2/firebaseui.css" />
    <!-- firebase end ******************************************-->
</head>

<!--*************************************************************
  BODY
**************************************************************-->
<body>

    <header>
        <h1 id="m_title">Game Selection</h1>
    </header>
            <side-bar id="side-bar">
            <a id="sb_title">"Player name"</a>
            <button class="sb_button" onclick="fb_Logout()" >Log Out</button>
        </side-bar>
        
        <info-bar class="info-bar">
            <a id="ib_title">Select a game</a>
            <a class="ib_element" id = "ib_marker"></a>
            <a class="ib_element" id="leaderBoard"> </a>
            <button class="ib_element" id="ib_playButton" style="margin-top:8%;">Play</button>
        </info-bar>


        <section>
            <div class="m_container">
                <button id ="bdButton" onclick="ib_loadGame('bd')">Blob Defenders</button>
                <button id="gtnButton" onclick="ib_loadGame('gtn')">Guess the Number</button>  
            </div>
        </section>
        
    <button class="sb_button" onclick="fb_Logout(3)" >Log Out</button>

    <!-- JS files & main module ***************************-->
    <script type="module" src="../../pages/main/main.mjs"></script>
    
    <script type="module" src="./gameSelection.mjs"></script>
</body>
</html>
<!--*************************************************************
  END OF INDEX.HTML
**************************************************************-->
